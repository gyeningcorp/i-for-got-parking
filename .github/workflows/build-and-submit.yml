name: Build & Submit to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write ASC API Key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$ASC_PRIVATE_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup code signing (cert + profile via ASC API)
        run: node setup-signing.js
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          BUNDLE_ID: com.gyeningcorp.parkspot
          TEAM_ID: 4LZJ7U5FHS

      - name: Generate all icon sizes from 1024px source
        run: |
          ICONDIR="Sources/IForGotParking/Assets.xcassets/AppIcon.appiconset"
          SRC="$ICONDIR/icon-1024.png"
          # Strip alpha channel (convert to JPEG and back removes alpha completely)
          sips -s format jpeg "$SRC" --out /tmp/icon_flat.jpg
          sips -s format png /tmp/icon_flat.jpg --out "$SRC"
          # Generate all required pixel-exact sizes
          for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180; do
            sips -z $SIZE $SIZE "$SRC" --out "$ICONDIR/icon-${SIZE}.png"
          done

      - name: Archive app
        run: |
          xcodebuild archive \
            -scheme IForGotParking \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/IForGotParking.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$DIST_PROFILE_UUID" \
            DEVELOPMENT_TEAM=4LZJ7U5FHS

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>4LZJ7U5FHS</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>com.gyeningcorp.parkspot</key><string>$DIST_PROFILE_UUID</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/IForGotParking.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --file "$RUNNER_TEMP/export/IForGotParking.ipa" \
            --type ios \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }} \
            --private-key @path:/Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
