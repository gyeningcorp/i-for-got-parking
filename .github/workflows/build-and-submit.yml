name: Build & Submit to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write ASC API Key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$ASC_PRIVATE_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup code signing (cert + profile via ASC API)
        run: node setup-signing.js
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_PATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          TEAM_ID: 4LZJ7U5FHS
          BUNDLE_ID: com.gyeningcorp.parkspot

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Sources/IForGotParking/Info.plist
          echo "Build number set to $GITHUB_RUN_NUMBER"

      - name: Generate all icon sizes from 1024px source
        run: |
          SRC="Sources/IForGotParking/Assets.xcassets/AppIcon.appiconset/icon-1024.png"
          DIR="Sources/IForGotParking/Assets.xcassets/AppIcon.appiconset"
          for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180 1024; do
            sips -z $SIZE $SIZE "$SRC" --out "$DIR/icon-${SIZE}.png" > /dev/null 2>&1
          done
          for PNG in "$DIR"/icon-*.png; do
            TMP="${PNG%.png}_tmp.jpg"
            sips -s format jpeg "$PNG" --out "$TMP" > /dev/null 2>&1
            sips -s format png "$TMP" --out "$PNG" > /dev/null 2>&1
            rm "$TMP"
          done
          echo "Icons generated"

      - name: Archive app
        run: |
          xcodebuild archive \
            -scheme IForGotParking \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/IForGotParking.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$DIST_PROFILE_UUID" \
            DEVELOPMENT_TEAM=4LZJ7U5FHS \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER \
            | xcpretty || true
          ls $RUNNER_TEMP/IForGotParking.xcarchive

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>4LZJ7U5FHS</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>com.gyeningcorp.parkspot</key><string>$DIST_PROFILE_UUID</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/IForGotParking.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --file "$RUNNER_TEMP/export/IForGotParking.ipa" \
            --type ios \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }} \
            --private-key @path:/Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Submit for App Store Review
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          APP_ID: "6760226960"
        run: |
          node - <<'JSEOF'
          const https = require('https');
          const crypto = require('crypto');
          const fs = require('fs');
          const KEY_ID = process.env.ASC_KEY_ID;
          const ISSUER = process.env.ASC_ISSUER_ID;
          const KEY_PATH = process.env.ASC_KEY_PATH;
          const APP_ID = process.env.APP_ID;

          function jwt() {
            const key = fs.readFileSync(KEY_PATH, 'utf8');
            const h = Buffer.from(JSON.stringify({alg:'ES256',kid:KEY_ID,typ:'JWT'})).toString('base64url');
            const n = Math.floor(Date.now()/1000);
            const p = Buffer.from(JSON.stringify({iss:ISSUER,iat:n,exp:n+1200,aud:'appstoreconnect-v1'})).toString('base64url');
            const s = crypto.createSign('SHA256').update(`${h}.${p}`).sign({key, dsaEncoding:'ieee-p1363'}).toString('base64url');
            return `${h}.${p}.${s}`;
          }

          function call(method, path, body) {
            return new Promise((resolve, reject) => {
              const data = body ? JSON.stringify(body) : undefined;
              const req = https.request({
                hostname: 'api.appstoreconnect.apple.com', path, method,
                headers: {
                  Authorization: `Bearer ${jwt()}`,
                  'Content-Type': 'application/json',
                  ...(data ? {'Content-Length': Buffer.byteLength(data)} : {})
                }
              }, res => {
                let x = '';
                res.on('data', c => x += c);
                res.on('end', () => {
                  try { resolve({s: res.statusCode, b: JSON.parse(x)}); }
                  catch { resolve({s: res.statusCode, b: x}); }
                });
              });
              req.on('error', reject);
              if (data) req.write(data);
              req.end();
            });
          }

          async function main() {
            // 1. Get app store version
            const vr = await call('GET', `/v1/apps/${APP_ID}/appStoreVersions?filter[platform]=IOS&filter[appStoreState]=PREPARE_FOR_SUBMISSION,WAITING_FOR_REVIEW,IN_REVIEW,PENDING_APPLE_RELEASE`);
            const versions = vr.b.data || [];
            console.log('Versions:', versions.map(v => v.attributes.versionString + ':' + v.attributes.appStoreState));

            const inReview = versions.find(v => ['WAITING_FOR_REVIEW','IN_REVIEW','PENDING_APPLE_RELEASE'].includes(v.attributes.appStoreState));
            if (inReview) { console.log('Already under Apple review:', inReview.attributes.appStoreState); return; }

            const version = versions.find(v => v.attributes.appStoreState === 'PREPARE_FOR_SUBMISSION');
            if (!version) { console.log('No version to submit'); return; }
            const versionId = version.id;
            console.log('Version ID:', versionId);

            // 2. Wait for latest valid build
            console.log('Waiting for build...');
            let buildId;
            for (let i = 0; i < 20; i++) {
              await new Promise(r => setTimeout(r, 30000));
              const r = await call('GET', `/v1/builds?filter[app]=${APP_ID}&sort=-uploadedDate&limit=10`);
              for (const b of (r.b.data || [])) {
                console.log('Build', b.attributes.version, b.attributes.processingState);
                if (b.attributes.processingState === 'VALID' && b.attributes.version !== '1') {
                  buildId = b.id; break;
                }
              }
              if (buildId) break;
            }
            if (!buildId) { console.log('No valid build'); return; }
            console.log('Build ID:', buildId);

            // 3. Assign build to version
            const ar = await call('PATCH', `/v1/appStoreVersions/${versionId}/relationships/build`, {data: {type: 'builds', id: buildId}});
            console.log('Assign build:', ar.s);
            await new Promise(r => setTimeout(r, 3000));

            // 4. CANCEL ALL existing review submissions (even READY_FOR_REVIEW ones with 0 items)
            console.log('Checking existing submissions...');
            const existRS = await call('GET', `/v1/reviewSubmissions?filter[app]=${APP_ID}&filter[platform]=IOS`);
            for (const rs of (existRS.b.data || [])) {
              const st = rs.attributes.state;
              console.log('Found submission:', rs.id, 'state:', st);
              if (st === 'IN_REVIEW' || st === 'PENDING_APPLE_RELEASE') { console.log('Under review already!'); return; }
              if (st === 'COMPLETE' || st === 'CANCELING') continue;
              // Cancel everything else (including READY_FOR_REVIEW with 0 items)
              console.log('Canceling submission:', rs.id);
              const cr = await call('PATCH', `/v1/reviewSubmissions/${rs.id}`, {
                data: {type: 'reviewSubmissions', id: rs.id, attributes: {action: 'CANCEL'}}
              });
              console.log('Cancel result:', cr.s, JSON.stringify(cr.b).slice(0, 200));
              await new Promise(r => setTimeout(r, 3000));
            }

            // 5. Create fresh review submission
            console.log('Creating review submission...');
            const rsR = await call('POST', '/v1/reviewSubmissions', {
              data: {
                type: 'reviewSubmissions',
                attributes: {platform: 'IOS'},
                relationships: {app: {data: {type: 'apps', id: APP_ID}}}
              }
            });
            console.log('Create submission:', rsR.s);
            if (rsR.s !== 201) { console.log(JSON.stringify(rsR.b, null, 2)); process.exit(1); }
            const rsId = rsR.b.data.id;
            const rsState = rsR.b.data.attributes.state;
            console.log('Submission ID:', rsId, 'State:', rsState);
            await new Promise(r => setTimeout(r, 5000));

            // 6. Add app store version as review item
            console.log('Adding review item...');
            const itemR = await call('POST', '/v1/reviewSubmissionItems', {
              data: {
                type: 'reviewSubmissionItems',
                relationships: {
                  reviewSubmission: {data: {type: 'reviewSubmissions', id: rsId}},
                  appStoreVersion: {data: {type: 'appStoreVersions', id: versionId}}
                }
              }
            });
            console.log('Add item:', itemR.s);
            if (itemR.s !== 201) {
              console.log('ITEM ERROR:', JSON.stringify(itemR.b, null, 2));
            }
            await new Promise(r => setTimeout(r, 3000));

            // 7. Submit
            console.log('Submitting...');
            const sr = await call('PATCH', `/v1/reviewSubmissions/${rsId}`, {
              data: {type: 'reviewSubmissions', id: rsId, attributes: {action: 'SUBMIT'}}
            });
            console.log('Submit:', sr.s);
            if (sr.s === 200 || sr.s === 201) {
              console.log('SUCCESS: I For Got Parking submitted for App Store Review!');
            } else {
              console.log('SUBMIT ERROR:', JSON.stringify(sr.b, null, 2));
              process.exit(1);
            }
          }

          main().catch(e => { console.log('Error:', e.message); process.exit(1); });
          JSEOF
