name: Build & Submit to App Store

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: sudo xcode-select -s /Applications/Xcode_16.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Write ASC API Key
        run: |
          mkdir -p ~/.private_keys
          printf '%s' "$ASC_PRIVATE_KEY" > ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
          chmod 600 ~/.private_keys/AuthKey_${ASC_KEY_ID}.p8
        env:
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup code signing (cert + profile via ASC API)
        run: node setup-signing.js
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          BUNDLE_ID: com.gyeningcorp.parkspot
          TEAM_ID: 4LZJ7U5FHS

      - name: Set build number
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $GITHUB_RUN_NUMBER" Sources/IForGotParking/Info.plist
          echo "Build number set to $GITHUB_RUN_NUMBER"

      - name: Generate all icon sizes from 1024px source
        run: |
          ICONDIR="Sources/IForGotParking/Assets.xcassets/AppIcon.appiconset"
          SRC="$ICONDIR/icon-1024.png"
          # Strip alpha channel (convert to JPEG and back removes alpha completely)
          sips -s format jpeg "$SRC" --out /tmp/icon_flat.jpg
          sips -s format png /tmp/icon_flat.jpg --out "$SRC"
          # Generate all required pixel-exact sizes
          for SIZE in 20 29 40 58 60 76 80 87 120 152 167 180; do
            sips -z $SIZE $SIZE "$SRC" --out "$ICONDIR/icon-${SIZE}.png"
          done

      - name: Archive app
        run: |
          xcodebuild archive \
            -scheme IForGotParking \
            -destination "generic/platform=iOS" \
            -archivePath $RUNNER_TEMP/IForGotParking.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE="$DIST_PROFILE_UUID" \
            DEVELOPMENT_TEAM=4LZJ7U5FHS \
            CURRENT_PROJECT_VERSION=$GITHUB_RUN_NUMBER

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>teamID</key><string>4LZJ7U5FHS</string>
            <key>signingStyle</key><string>manual</string>
            <key>provisioningProfiles</key>
            <dict><key>com.gyeningcorp.parkspot</key><string>$DIST_PROFILE_UUID</string></dict>
          </dict></plist>
          EOF
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/IForGotParking.xcarchive \
            -exportPath $RUNNER_TEMP/export \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --file "$RUNNER_TEMP/export/IForGotParking.ipa" \
            --type ios \
            --apiKey ${{ secrets.ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.ASC_ISSUER_ID }} \
            --private-key @path:/Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8

      - name: Submit for App Store Review
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_PATH: /Users/runner/.private_keys/AuthKey_${{ secrets.ASC_KEY_ID }}.p8
          APP_ID: "6760226960"
        run: |
          node - <<'EOF'
          const https = require('https');
          const crypto = require('crypto');
          const fs = require('fs');
          
          const KEY_ID = process.env.ASC_KEY_ID;
          const ISSUER = process.env.ASC_ISSUER_ID;
          const KEY_PATH = process.env.ASC_KEY_PATH;
          const APP_ID = process.env.APP_ID;
          
          function jwt() {
            const key = fs.readFileSync(KEY_PATH,'utf8');
            const h = Buffer.from(JSON.stringify({alg:'ES256',kid:KEY_ID,typ:'JWT'})).toString('base64url');
            const n = Math.floor(Date.now()/1000);
            const p = Buffer.from(JSON.stringify({iss:ISSUER,iat:n,exp:n+1200,aud:'appstoreconnect-v1'})).toString('base64url');
            const s = crypto.createSign('SHA256').update(`${h}.${p}`).sign({key,dsaEncoding:'ieee-p1363'}).toString('base64url');
            return `${h}.${p}.${s}`;
          }
          
          function call(method, path, body) {
            return new Promise((res,rej) => {
              const d = body ? JSON.stringify(body) : undefined;
              const r = https.request({hostname:'api.appstoreconnect.apple.com',path,method,
                headers:{Authorization:`Bearer ${jwt()}`,'Content-Type':'application/json',...(d?{'Content-Length':Buffer.byteLength(d)}:{})}
              }, resp => { let x=''; resp.on('data',c=>x+=c); resp.on('end',()=>{try{res({s:resp.statusCode,b:JSON.parse(x)})}catch{res({s:resp.statusCode,b:x})}}); });
              r.on('error',rej); if(d) r.write(d); r.end();
            });
          }
          
          async function main() {
            // Wait for build to be valid
            console.log('Waiting for build to be VALID in TestFlight...');
            let buildId;
            for(let i=0;i<20;i++) {
              await new Promise(r=>setTimeout(r,30000));
              const r = await call('GET',`/v1/builds?filter[app]=${APP_ID}&sort=-uploadedDate&limit=5`);
              for(const b of (r.b.data||[])) {
                console.log(`Build ${b.attributes.version}: ${b.attributes.processingState}`);
                if(b.attributes.processingState==='VALID' && b.attributes.version !== '1') {
                  buildId=b.id; break;
                }
              }
              if(buildId) break;
            }
            if(!buildId){console.log('No valid build found');return;}
            console.log('Found build: '+buildId);
            
            // Get version
            const vr = await call('GET',`/v1/apps/${APP_ID}/appStoreVersions?filter[platform]=IOS&filter[appStoreState]=PREPARE_FOR_SUBMISSION`);
            const versionId = vr.b.data?.[0]?.id;
            if(!versionId){console.log('No version found:',JSON.stringify(vr.b));return;}
            console.log('Version: '+versionId);
            
            // Assign build
            const ar = await call('PATCH',`/v1/appStoreVersions/${versionId}/relationships/build`,{data:{type:'builds',id:buildId}});
            console.log('Assign: '+ar.s);
            
            await new Promise(r=>setTimeout(r,3000));
            
            // Check current state
            const stateR = await call('GET',`/v1/appStoreVersions/${versionId}`);
            const state = stateR.b.data?.attributes?.appStoreState;
            console.log('Version state: '+state);
            if(state==='WAITING_FOR_REVIEW'||state==='IN_REVIEW'||state==='PENDING_APPLE_RELEASE') {
              console.log('SUCCESS: Already submitted/in review!'); return;
            }

            // Delete any existing submission first
            const existSub = await call('GET',`/v1/appStoreVersions/${versionId}/appStoreVersionSubmission`);
            if(existSub.s===200 && existSub.b.data?.id) {
              console.log('Deleting old submission...');
              await call('DELETE',`/v1/appStoreVersionSubmissions/${existSub.b.data.id}`);
            }

            // Use new reviewSubmissions API
            console.log('Creating review submission...');
            const rs = await call('POST','/v1/reviewSubmissions',{data:{type:'reviewSubmissions',attributes:{platform:'IOS'},relationships:{app:{data:{type:'apps',id:APP_ID}}}}});
            console.log('ReviewSub create: '+rs.s);
            if(rs.s!==201){console.log('Response:',JSON.stringify(rs.b,null,2));return;}
            const rsId = rs.b.data.id;

            // Add version item
            const ri = await call('POST',`/v1/reviewSubmissions/${rsId}/items`,{data:{type:'reviewSubmissionItems',relationships:{appStoreVersion:{data:{type:'appStoreVersions',id:versionId}}}}});
            console.log('Add item: '+ri.s);

            // Add appStoreVersion as review item
            const itemR = await call('POST','/v1/reviewSubmissionItems',{data:{type:'reviewSubmissionItems',
              relationships:{reviewSubmission:{data:{type:'reviewSubmissions',id:rsId}},
                appStoreVersion:{data:{type:'appStoreVersions',id:versionId}}}}});
            console.log('Add item: '+itemR.s);

            // Submit
            const sr = await call('PATCH',`/v1/reviewSubmissions/${rsId}`,{data:{type:'reviewSubmissions',id:rsId,attributes:{action:'SUBMIT'}}});
            console.log('Submit: '+sr.s);
            if(sr.s===200||sr.s===201) console.log('SUCCESS: Submitted for App Store Review!');
            else console.log('Submit response:',JSON.stringify(sr.b,null,2));
          }
          
          main().catch(e=>{ console.log('Error:',e.message); process.exit(1); });
          EOF
